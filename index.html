<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郵便番号検索</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      padding: 48px 40px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      color: #333;
      margin-bottom: 8px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 0.9rem;
      margin-bottom: 36px;
    }

    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 1.1rem;
      letter-spacing: 2px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #667eea;
    }

    button {
      padding: 14px 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }

    button:hover {
      opacity: 0.9;
    }

    button:active {
      transform: scale(0.97);
    }

    .result {
      display: none;
      background: #f8f6ff;
      border: 2px solid #e8e0ff;
      border-radius: 12px;
      padding: 24px;
    }

    .result.visible {
      display: block;
    }

    .result-label {
      font-size: 0.75rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .result-value {
      font-size: 1.1rem;
      color: #333;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .result-value:last-child {
      margin-bottom: 0;
    }

    .error {
      display: none;
      background: #fff3f3;
      border: 2px solid #ffd5d5;
      border-radius: 12px;
      padding: 16px 20px;
      color: #d32f2f;
      font-size: 0.95rem;
      text-align: center;
    }

    .error.visible {
      display: block;
    }

    .loading {
      text-align: center;
      color: #888;
      font-size: 0.95rem;
      padding: 16px;
      display: none;
    }

    .loading.visible {
      display: block;
    }

    .hint {
      text-align: center;
      color: #bbb;
      font-size: 0.8rem;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>📮 郵便番号検索</h1>
    <p class="subtitle">郵便番号を入力して住所を検索</p>

    <div class="input-group">
      <input
        type="text"
        id="zipInput"
        placeholder="例：100-0001"
        maxlength="8"
        inputmode="numeric"
      >
      <button onclick="search()">検索</button>
    </div>

    <div class="loading" id="loading">検索中...</div>

    <div class="result" id="result">
      <div class="result-label">都道府県</div>
      <div class="result-value" id="pref"></div>
      <div class="result-label">市区町村</div>
      <div class="result-value" id="city"></div>
      <div class="result-label">町域</div>
      <div class="result-value" id="town"></div>
    </div>

    <div class="error" id="error"></div>

    <p class="hint">ハイフンあり・なし、どちらでも検索できます</p>
  </div>

  <script>
    const zipInput = document.getElementById('zipInput');

    zipInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') search();
    });

    zipInput.addEventListener('input', () => {
      const val = zipInput.value.replace(/[^0-9]/g, '');
      if (val.length > 3) {
        zipInput.value = val.slice(0, 3) + '-' + val.slice(3, 7);
      } else {
        zipInput.value = val;
      }
    });

    async function search() {
      const zip = zipInput.value.replace(/-/g, '').trim();

      hide('result');
      hide('error');
      hide('loading');

      if (!/^\d{7}$/.test(zip)) {
        showError('7桁の数字で郵便番号を入力してください（例：1000001）');
        return;
      }

      show('loading');

      try {
        const res = await fetch(`https://zipcloud.ibsnet.co.jp/api/search?zipcode=${zip}`);
        const data = await res.json();

        hide('loading');

        if (data.status !== 200) {
          showError('APIの呼び出しに失敗しました。しばらくしてから再試行してください。');
          return;
        }

        if (!data.results) {
          showError('該当する住所が見つかりませんでした。');
          return;
        }

        const r = data.results[0];
        document.getElementById('pref').textContent = r.address1;
        document.getElementById('city').textContent = r.address2;
        document.getElementById('town').textContent = r.address3 || '（町域情報なし）';
        show('result');

      } catch (e) {
        hide('loading');
        showError('通信エラーが発生しました。インターネット接続を確認してください。');
      }
    }

    function show(id) { document.getElementById(id).classList.add('visible'); }
    function hide(id) { document.getElementById(id).classList.remove('visible'); }
    function showError(msg) {
      document.getElementById('error').textContent = msg;
      show('error');
    }
  </script>
</body>
</html>
