<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郵便番号検索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">

    <div class="app-header">
      <h1>📮 郵便番号検索</h1>
      <p>郵便番号から住所と天気を調べる</p>
    </div>

    <div class="search-card">
      <div class="input-group">
        <input
          type="text"
          id="zipInput"
          placeholder="例：100-0001"
          maxlength="8"
          inputmode="numeric"
        >
        <button onclick="search()">検索</button>
      </div>

      <div class="loading" id="loading">
        <div class="spinner"></div>
        検索中...
      </div>

      <div class="error" id="error">
        <span>⚠️</span>
        <span id="errorMsg"></span>
      </div>
    </div>

    <!-- 住所 -->
    <div class="address-card" id="result">
      <div class="address-card-header">
        <span>📍</span>
        <span class="label">住所</span>
      </div>
      <div class="address-rows">
        <div class="address-row">
          <span class="address-row-label">都道府県</span>
          <span class="address-row-value" id="pref"></span>
        </div>
        <div class="address-row">
          <span class="address-row-label">市区町村</span>
          <span class="address-row-value" id="city"></span>
        </div>
        <div class="address-row">
          <span class="address-row-label">町域</span>
          <span class="address-row-value" id="town"></span>
        </div>
      </div>
    </div>

    <!-- 天気 -->
    <div class="weather-card" id="weather">
      <div class="weather-card-header">
        <span>🌤</span>
        <span class="label">天気情報</span>
        <span class="city-name" id="weatherCity"></span>
      </div>

      <div class="weather-loading" id="weatherLoading">
        <div class="spinner"></div>
        天気を取得中...
      </div>

      <div class="weather-error" id="weatherError"></div>

      <div class="weather-body" id="weatherContent">
        <div class="weather-main">
          <div class="weather-left">
            <div class="weather-emoji" id="weatherIcon"></div>
            <div class="weather-desc-text" id="weatherDesc"></div>
          </div>
          <div class="weather-right">
            <div class="weather-temp-row">
              <span class="weather-temp-num" id="weatherTemp"></span>
              <span class="weather-temp-deg">°C</span>
            </div>
            <div class="weather-feels">体感 <span id="weatherFeels"></span>°C</div>
          </div>
        </div>

        <div class="weather-stats">
          <div class="weather-stat">
            <span class="stat-label">💧 湿度</span>
            <span class="stat-value"><span id="weatherHumidity"></span>%</span>
          </div>
          <div class="weather-stat">
            <span class="stat-label">💨 風速</span>
            <span class="stat-value"><span id="weatherWind"></span> km/h</span>
          </div>
          <div class="weather-stat">
            <span class="stat-label">🌡 最高気温</span>
            <span class="stat-value"><span id="weatherTempMax"></span>°C</span>
          </div>
          <div class="weather-stat">
            <span class="stat-label">🌡 最低気温</span>
            <span class="stat-value"><span id="weatherTempMin"></span>°C</span>
          </div>
        </div>
      </div>
    </div>

    <p class="hint">ハイフンあり・なし、どちらでも検索できます</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
