<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>郵便番号検索</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="card">
    <h1>📮 郵便番号検索</h1>
    <p class="subtitle">郵便番号を入力して住所を検索</p>

    <div class="input-group">
      <input
        type="text"
        id="zipInput"
        placeholder="例：100-0001"
        maxlength="8"
        inputmode="numeric"
      >
      <button onclick="search()">検索</button>
    </div>

    <div class="loading" id="loading">検索中...</div>

    <div class="result" id="result">
      <div class="result-label">都道府県</div>
      <div class="result-value" id="pref"></div>
      <div class="result-label">市区町村</div>
      <div class="result-value" id="city"></div>
      <div class="result-label">町域</div>
      <div class="result-value" id="town"></div>
    </div>

    <div class="error" id="error"></div>

    <p class="hint">ハイフンあり・なし、どちらでも検索できます</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
